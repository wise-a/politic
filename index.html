<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Political Cockade Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .cockade-container {
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.15));
        }
        input[type="number"] {
            border: 1px solid #d1d5db;
            padding: 0.5rem;
            border-radius: 0.5rem;
            width: 100%;
        }
        input[type="color"] {
            width: 40px;
            height: 40px;
            padding: 0;
            border: none;
            background: none;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[800px]">
        
        <!-- UI Controls Side -->
        <div class="w-full md:w-2/5 p-6 border-r border-gray-100 bg-gray-50 overflow-y-auto max-h-screen">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Cockade Maker Pro</h1>
            
            <div class="space-y-6">
                <!-- Row Count -->
                <div class="grid grid-cols-2 gap-4 items-center">
                    <label class="text-sm font-semibold text-gray-700">Number of Rows</label>
                    <input type="number" id="rowCount" min="1" max="10" value="3">
                </div>

                <!-- Pleat Density -->
                <div class="grid grid-cols-2 gap-4 items-center">
                    <label class="text-sm font-semibold text-gray-700">Pleat Count (Folds)</label>
                    <input type="number" id="pleatCount" min="4" max="200" value="32">
                </div>

                <!-- Center Button Size -->
                <div class="grid grid-cols-2 gap-4 items-center">
                    <label class="text-sm font-semibold text-gray-700">Center Size (px)</label>
                    <input type="number" id="centerSize" min="10" max="150" value="45">
                </div>

                <hr class="border-gray-200">

                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800">Row Colors</h2>
                    <span class="text-xs text-gray-400 font-mono italic">Primary / Secondary (Optional)</span>
                </div>
                
                <div id="colorInputs" class="space-y-4">
                    <!-- Dynamic color pickers will be injected here -->
                </div>

                <hr class="border-gray-200">

                <!-- Export Actions -->
                <div class="grid grid-cols-1 gap-3">
                    <button id="copySVG" class="w-full bg-white border border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-semibold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        Copy SVG
                    </button>
                    <button id="downloadPNG" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        Download PNG
                    </button>
                </div>

                <div id="toast" class="hidden text-center text-sm font-medium text-green-600 mt-2">
                    Action Completed!
                </div>
            </div>
        </div>

        <!-- Preview Side -->
        <div class="w-full md:w-3/5 p-8 flex flex-col items-center justify-center bg-white">
            <div id="canvasWrapper" class="cockade-container w-full aspect-square max-w-[550px] flex items-center justify-center">
                <!-- SVG injected here -->
            </div>
            
            <p class="mt-8 text-gray-400 text-xs text-center max-w-sm">
                Tip: Set "Secondary Color" to the same as "Primary" for solid rings. 
                Vary them to create the checkered pattern shown in historical cockades.
            </p>
        </div>
    </div>

    <!-- Hidden canvas for PNG export -->
    <canvas id="exportCanvas" class="hidden" width="1000" height="1000"></canvas>

    <script>
        const rowCountInput = document.getElementById('rowCount');
        const colorInputsContainer = document.getElementById('colorInputs');
        const pleatCountInput = document.getElementById('pleatCount');
        const centerSizeInput = document.getElementById('centerSize');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const copyBtn = document.getElementById('copySVG');
        const downloadBtn = document.getElementById('downloadPNG');
        const toast = document.getElementById('toast');

        // Initial state
        let rowConfigs = [
            { primary: '#002395', secondary: '#ffffff' }, // Outer
            { primary: '#ffffff', secondary: '#002395' }, // Middle
            { primary: '#ed2939', secondary: '#991b1b' }  // Inner
        ];
        
        function updateUI() {
            const count = parseInt(rowCountInput.value) || 1;
            
            // Sync rowConfigs array length
            while (rowConfigs.length < count) {
                rowConfigs.push({ primary: '#cccccc', secondary: '#cccccc' });
            }
            if (rowConfigs.length > count) {
                rowConfigs = rowConfigs.slice(0, count);
            }

            // Redraw color inputs
            colorInputsContainer.innerHTML = '';
            rowConfigs.forEach((config, index) => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-2 p-2 bg-white rounded-lg border border-gray-100 shadow-sm';
                div.innerHTML = `
                    <span class="text-xs font-bold text-gray-400 w-12 shrink-0">#${index + 1}</span>
                    <input type="color" value="${config.primary}" data-index="${index}" data-type="primary">
                    <input type="color" value="${config.secondary}" data-index="${index}" data-type="secondary">
                    <span class="text-[10px] text-gray-400 font-mono ml-auto">${config.primary}</span>
                `;
                colorInputsContainer.appendChild(div);
            });

            // Re-attach listeners to new inputs
            colorInputsContainer.querySelectorAll('input[type="color"]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = e.target.dataset.index;
                    const type = e.target.dataset.type;
                    rowConfigs[idx][type] = e.target.value;
                    renderCockade();
                });
            });

            renderCockade();
        }

        function renderCockade() {
            const numRows = rowConfigs.length;
            const pleats = parseInt(pleatCountInput.value) || 12;
            const centerR = parseInt(centerSizeInput.value) || 20;
            const size = 1000; // Render high-res for export
            const center = size / 2;
            const maxR = (size / 2) - 40;
            
            const step = (maxR - centerR) / numRows;

            let svgContent = `<svg id="cockade-svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">`;
            
            svgContent += `
                <defs>
                    <filter id="dropshadow" height="130%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
                        <feOffset dx="0" dy="5" result="offsetblur"/>
                        <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
                        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <radialGradient id="buttonShade">
                        <stop offset="60%" stop-color="rgba(0,0,0,0)" />
                        <stop offset="100%" stop-color="rgba(0,0,0,0.2)" />
                    </radialGradient>
                </defs>
            `;

            // Draw each row from outside in
            for (let i = 0; i < numRows; i++) {
                const config = rowConfigs[i];
                const outerR = maxR - (i * step);
                const innerR = maxR - ((i + 1) * step);
                
                const angleStep = (Math.PI * 2) / pleats;
                
                for (let j = 0; j < pleats; j++) {
                    const startAngle = j * angleStep;
                    const midAngle = (j + 0.5) * angleStep;
                    const endAngle = (j + 1) * angleStep;
                    
                    const currentColor = (j % 2 === 0) ? config.primary : config.secondary;

                    // We split each pleat into two halves (triangles) to handle 3D folding shading
                    // Half 1: Upward fold
                    const p1 = { x: center + outerR * Math.cos(startAngle), y: center + outerR * Math.sin(startAngle) };
                    const p2 = { x: center + innerR * Math.cos(startAngle), y: center + innerR * Math.sin(startAngle) };
                    const p3 = { x: center + innerR * Math.cos(midAngle), y: center + innerR * Math.sin(midAngle) };
                    const p4 = { x: center + outerR * Math.cos(midAngle), y: center + outerR * Math.sin(midAngle) };
                    
                    // Half 2: Downward fold
                    const p5 = { x: center + innerR * Math.cos(endAngle), y: center + innerR * Math.sin(endAngle) };
                    const p6 = { x: center + outerR * Math.cos(endAngle), y: center + outerR * Math.sin(endAngle) };

                    // Draw the segment
                    const pathD = `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y} L ${p5.x} ${p5.y} L ${p6.x} ${p6.y} Z`;
                    svgContent += `<path d="${pathD}" fill="${currentColor}" />`;

                    // ADDING THE SHADING (This fixes the "wrong shading" issue)
                    // We add a semi-transparent black overlay to one half of the pleat to simulate light/shadow
                    // Using "midAngle" to ensure the shadow is locked to the fold logic
                    const shadePath = `M ${p4.x} ${p4.y} L ${p3.x} ${p3.y} L ${p5.x} ${p5.y} L ${p6.x} ${p6.y} Z`;
                    svgContent += `<path d="${shadePath}" fill="black" opacity="0.12" />`;
                    
                    // Add a thin highlight line on the outer fold for definition
                    svgContent += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="white" stroke-opacity="0.1" stroke-width="1" />`;
                }
            }

            // Central "Button"
            svgContent += `<circle cx="${center}" cy="${center}" r="${centerR}" fill="${rowConfigs[rowConfigs.length-1].primary}" filter="url(#dropshadow)" />`;
            svgContent += `<circle cx="${center}" cy="${center}" r="${centerR}" fill="url(#buttonShade)" />`;
            
            svgContent += `</svg>`;
            canvasWrapper.innerHTML = svgContent;
        }

        async function exportPNG() {
            const svgEl = document.getElementById('cockade-svg');
            const canvas = document.getElementById('exportCanvas');
            const ctx = canvas.getContext('2d');
            
            const svgData = new XMLSerializer().serializeToString(svgEl);
            const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, 1000, 1000);
                URL.revokeObjectURL(url);
                
                const pngUrl = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.href = pngUrl;
                downloadLink.download = `cockade_${Date.now()}.png`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                
                showToast();
            };
            img.src = url;
        }

        function copySVG() {
            const svg = document.getElementById('cockade-svg').outerHTML;
            const el = document.createElement('textarea');
            el.value = svg;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast();
        }

        function showToast() {
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        rowCountInput.addEventListener('change', updateUI);
        pleatCountInput.addEventListener('change', renderCockade);
        centerSizeInput.addEventListener('change', renderCockade);
        copyBtn.addEventListener('click', copySVG);
        downloadBtn.addEventListener('click', exportPNG);

        // Initialize
        updateUI();

    </script>
</body>
</html>
